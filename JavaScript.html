<script>
let currentUser=null,stats={};
document.addEventListener('DOMContentLoaded',async()=>{await loadUserInfo();await loadDashboard();setupListeners()});
async function loadUserInfo(){try{currentUser=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getCurrentUser()});document.getElementById('userName').textContent=currentUser.name||currentUser.email;document.getElementById('userRole').textContent=currentUser.role||'Employee';document.getElementById('userAvatar').textContent=(currentUser.name||'U').charAt(0).toUpperCase();if(currentUser.role==='HR Admin'||currentUser.role==='Admin'){document.querySelectorAll('.hr-only').forEach(el=>el.style.display='flex')}}catch(e){}}
function setupListeners(){document.querySelectorAll('.nav-item').forEach(b=>{b.addEventListener('click',()=>{if(b.dataset.view)switchView(b.dataset.view)})});document.getElementById('employeeForm').addEventListener('submit',handleAddEmployee)}
function switchView(view){document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.view===view));document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===view+'View'));document.getElementById('pageTitle').textContent={dashboard:'Dashboard',employees:'Employees','new-employee':'Add Employee'}[view]||'Dashboard';if(view==='employees')renderEmployees()}
async function loadDashboard(){try{stats=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getDashboardStats()});document.getElementById('statTotal').textContent=stats.totalEmployees;document.getElementById('statActive').textContent=stats.active;document.getElementById('statOnboarding').textContent=stats.onboarding;renderEmployeePreview(stats.employees.slice(0,5))}catch(e){}}
function renderEmployeePreview(employees){const container=document.getElementById('employeesPreview');if(!employees.length){container.innerHTML='<p style="text-align:center;color:var(--gray-500);padding:40px">No employees yet</p>';return}container.innerHTML='<h3>Recent Employees</h3>'+employees.map(e=>`<div class="employee-card"><div class="employee-avatar">${e.firstName.charAt(0)}</div><div class="employee-info"><div class="employee-name">${e.firstName} ${e.lastName}</div><div class="employee-dept">${e.designation} · ${e.department}</div></div><div class="employee-meta"><span class="status-badge ${e.status.toLowerCase()}">${e.status}</span><div class="employee-date">Joined: ${e.joinDate?new Date(e.joinDate).toLocaleDateString():''}</div></div></div>`).join('')}
async function renderEmployees(){try{stats=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getDashboardStats()});document.getElementById('employeesList').innerHTML=stats.employees.length?stats.employees.map(e=>`<div class="employee-card"><div class="employee-avatar">${e.firstName.charAt(0)}</div><div class="employee-info"><div class="employee-name">${e.firstName} ${e.lastName}</div><div class="employee-dept">${e.designation} · ${e.department}</div><div style="font-size:12px;color:var(--gray-400)">${e.email}</div></div><div class="employee-meta"><span class="status-badge ${e.status.toLowerCase()}">${e.status}</span><div class="employee-date">Joined: ${e.joinDate?new Date(e.joinDate).toLocaleDateString():''}</div></div></div>`).join(''):'<p style="text-align:center;color:var(--gray-500);padding:40px">No employees yet</p>'}catch(e){showToast('Failed to load employees','error')}}
async function handleAddEmployee(e){e.preventDefault();try{await new Promise((r,rej)=>{google.script.run.withSuccessHandler(r).withFailureHandler(rej).addEmployee(document.getElementById('firstName').value,document.getElementById('lastName').value,document.getElementById('empEmail').value,document.getElementById('empPhone').value,document.getElementById('department').value,document.getElementById('designation').value,document.getElementById('joinDate').value,document.getElementById('manager').value)});showToast('Employee added! Onboarding checklist created.','success');document.getElementById('employeeForm').reset();loadDashboard();switchView('employees')}catch(err){showToast(err.message||'Failed to add employee','error')}}
function showToast(m,t='success'){const c=document.getElementById('toastContainer');const toast=document.createElement('div');toast.className=`toast ${t}`;toast.innerHTML=`<span>${m}</span>`;c.appendChild(toast);setTimeout(()=>{toast.style.opacity='0';setTimeout(()=>toast.remove(),300)},3000)}
</script>
